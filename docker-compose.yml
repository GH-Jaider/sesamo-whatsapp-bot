services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sesamo-bot
    restart: unless-stopped
    env_file:
      - ./whatsapp-bot/.env
    environment:
      - STATIC_ROOT=./static
    volumes:
      - bot_data:/app/data
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    container_name: sesamo-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  bot_data:
  caddy_data:
  caddy_config:
